services:
  - type: web
    name: ricerche-jw
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: FLASK_DEBUG
        value: "0"
